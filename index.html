<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

/* =====================
   BASE
   ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* Scrollbar rosa */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #111011; }
::-webkit-scrollbar-thumb { background: #FF88AF; border-radius: 100px; }
::-webkit-scrollbar-thumb:hover { background: #e0709a; }
* { scrollbar-width: thin; scrollbar-color: #FF88AF #111011; }

body, body * {
  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
  box-sizing: border-box;
}

body {
  background: #111011;
  color: #ffffff;
  overflow-x: hidden;
}

.hero-titulo,
.hero-titulo span { font-family: 'NorthSeano', sans-serif !important; }
.toggle-on { font-family: 'Aminute', cursive !important; }

/* =====================
   CABEÇALHO
   ===================== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 80px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 48px;
  background: rgba(17,16,17,0.85);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
nav .nav-spacer { display: block; }
nav .nav-center { display: flex; justify-content: center; }
nav .nav-right { display: flex; justify-content: flex-end; }
.nav-logo { height: 38px; width: auto; display: block; }

.btn-proposta {
  border: 1.5px solid rgba(255,255,255,0.3);
  color: #ffffff !important;
  background: transparent;
  padding: 9px 22px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.2s;
}
.btn-proposta:hover { background: #FF88AF; border-color: #FF88AF; }

/* =====================
   HERO
   ===================== */
.hero {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  align-items: center;
  padding: 80px 6vw 0;
  position: relative;
  overflow: hidden;
  background: #111011;
}
.hero::before, .hero::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.hero::before {
  width: 70vw; height: 70vw;
  right: -20vw; top: 50%;
  transform: translateY(-50%);
  border: 1.5px solid rgba(255,255,255,0.05);
}
.hero::after {
  width: 50vw; height: 50vw;
  right: -8vw; top: 50%;
  transform: translateY(-50%);
  border: 1px solid rgba(255,255,255,0.04);
}
.hero-titulo {
  font-family: 'NorthSeano', sans-serif !important;
  font-size: clamp(72px, 11vw, 140px);
  line-height: 0.93;
  font-weight: normal;
  margin-bottom: 44px;
  position: relative;
  z-index: 1;
  color: #ffffff !important;
}
.hero-titulo .rosa { color: #FF88AF !important; }

.toggle {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: #ffffff;
  border-radius: 100px;
  padding: 10px 14px 10px 24px;
  position: relative;
  z-index: 1;
}
.toggle-on {
  font-family: 'Aminute', cursive !important;
  color: #FF88AF;
  font-size: 30px;
  line-height: 1;
}
.toggle-bolinha {
  width: 46px; height: 46px;
  background: #E1EA28;
  border-radius: 50%;
}

/* =====================
   SEÇÕES — padrão
   ===================== */
section { padding: 96px 6vw; }

.titulo-secao {
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 48px;
  color: #ffffff !important;
}

/* =====================
   TICKER
   ===================== */
.ticker-wrap {
  overflow: hidden;
  background: #FF88AF;
  padding: 13px 0;
  width: 100%;
  max-width: 100vw;
}
.ticker-track {
  display: flex;
  width: max-content;
  animation: ticker 22s linear infinite;
}
.ticker-track:hover { animation-play-state: paused; }
.ticker-item {
  white-space: nowrap;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #111011 !important;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 28px;
}
.ticker-item::after { content: '✦'; font-size: 9px; opacity: 0.5; }
@keyframes ticker {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* =====================
   SOBRE
   ===================== */
.sobre {
  background: #111011;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 96px 6vw;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
}
.sobre-foto {
  width: 100%;
  aspect-ratio: 4/3;
  background: #1a181a;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px dashed rgba(255,255,255,0.12);
  margin-bottom: 40px;
}
.sobre-foto-label {
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.sobre-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.stat-num {
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 800;
  color: #FF88AF !important;
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.stat-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45) !important;
  line-height: 1.5;
}
.sobre-titulo {
  font-size: clamp(22px, 3vw, 36px);
  font-weight: 800;
  text-transform: uppercase;
  color: #ffffff !important;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 28px;
}
.sobre-texto {
  font-size: 16px;
  line-height: 1.8;
  color: rgba(255,255,255,0.55) !important;
  margin-bottom: 20px;
}
.sobre-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #FF88AF;
  color: #ffffff !important;
  text-decoration: none;
  padding: 16px 32px;
  border-radius: 100px;
  font-size: 15px;
  font-weight: 600;
  margin-top: 16px;
  transition: all 0.2s;
}
.sobre-cta:hover { background: #e0709a; transform: translateY(-2px); }

/* =====================
   PORTFÓLIO
   ===================== */
.portfolio { background: #111011; border-top: 1px solid rgba(255,255,255,0.06); }

.video-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.video-card {
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 9/13;
  background: #1a181a;
  cursor: pointer;
  position: relative;
}
.video-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.video-card:hover img { transform: scale(1.06); }
.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 40px 14px 14px;
  background: linear-gradient(to top, rgba(17,16,17,0.95), transparent);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-nome  { font-size: 14px; font-weight: 600; color: #ffffff !important; }
.card-cargo { font-size: 12px; color: #FF88AF !important; font-weight: 500; }
.card-play {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(17,16,17,0.3);
  opacity: 0;
  transition: opacity 0.3s;
}
.video-card:hover .card-play { opacity: 1; }
.play-btn {
  width: 58px; height: 58px;
  background: #FF88AF;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.play-tri {
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 17px solid #fff;
  margin-left: 4px;
}
.oculto { display: none; }
.ver-mais { text-align: center; margin-top: 40px; }
.btn-ver-mais {
  border: 1.5px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  background: transparent;
  padding: 13px 40px;
  border-radius: 100px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ver-mais:hover { border-color: #FF88AF; color: #ffffff; }

/* =====================
   INSTAGRAM
   ===================== */
.instagram {
  background: #1a181a;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 96px 6vw;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  color: #ffffff !important;
}
.instagram .titulo-secao { margin-bottom: 8px; max-width: 520px; }
.instagram p { color: rgba(255,255,255,0.5) !important; font-size: 16px; line-height: 1.7; max-width: 400px; }
.btn-instagram {
  margin-top: 16px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #FF88AF;
  color: #ffffff !important;
  text-decoration: none;
  padding: 15px 36px;
  border-radius: 100px;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-instagram:hover { background: #e0709a; transform: translateY(-2px); }

/* =====================
   SERVIÇOS
   ===================== */
.servicos {
  background: #111011 !important;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 80px 6vw 0;
}
.servicos .titulo-secao { color: #ffffff !important; margin-bottom: 56px; }
.srv-lista { list-style: none; }
.srv-item {
  display: grid;
  grid-template-columns: 56px 1fr 1fr;
  align-items: center;
  gap: 40px;
  padding: 40px 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  cursor: default;
}
.srv-item:last-child { border-bottom: 1px solid rgba(255,255,255,0.1); }
.srv-numero {
  font-size: 13px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35) !important;
  font-weight: 700;
}
.srv-nome {
  font-family: 'Space Grotesk', sans-serif !important;
  font-size: clamp(42px, 6vw, 88px);
  font-weight: 800;
  text-transform: uppercase;
  color: #ffffff !important;
  letter-spacing: -0.02em;
  line-height: 0.95;
  transition: color 0.2s;
}
.srv-item:hover .srv-nome { color: #FF88AF !important; }
.srv-desc {
  font-size: 11px;
  line-height: 1.6;
  color: rgba(255,255,255,0.45) !important;
  max-width: 320px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}

/* =====================
   CONTATO
   ===================== */
.contato {
  background: #111011;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: start;
  padding: 96px 6vw;
}
.contato .titulo-secao { font-size: clamp(24px, 3vw, 38px); text-transform: uppercase; font-weight: 900; color: #ffffff !important; }
.contato-item { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7) !important; font-size: 15px; margin-bottom: 16px; }
.contato-item span:first-child { color: #FF88AF !important; }
.redes-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.3) !important; margin: 28px 0 14px; display: block; font-weight: 600; }
.redes { display: flex; gap: 16px; }
.redes a { color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
.redes a:hover { color: #FF88AF; }
.form-box { background: #ffffff; border-radius: 16px; padding: 40px; }
.form-box h3 { font-size: 19px; font-weight: 700; color: #111011 !important; margin-bottom: 6px; }
.form-box p  { font-size: 13px; color: rgba(17,16,17,0.5) !important; margin-bottom: 24px; }
.form-box input {
  display: block; width: 100%;
  border: 1.5px solid rgba(17,16,17,0.1);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 14px;
  color: #111011 !important;
  margin-bottom: 12px;
  outline: none;
  background: #ffffff;
  transition: border-color 0.2s;
}
.form-box input::placeholder { color: rgba(17,16,17,0.3) !important; }
.form-box input:focus { border-color: #FF88AF; }
.btn-enviar {
  width: 100%;
  background: #FF88AF;
  color: #ffffff !important;
  border: none;
  border-radius: 100px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-enviar:hover { background: #e0709a; }

/* =====================
   RODAPÉ
   ===================== */
footer {
  background: #1a181a;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 36px 6vw;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.footer-logo { height: 26px; width: auto; display: block; }
.footer-copy  { font-size: 12px; color: rgba(255,255,255,0.25) !important; }

/* =====================
   MODAL DE VÍDEO
   ===================== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  isolation: isolate;
  align-items: center;
  justify-content: center;
}
.modal.aberto { display: flex; }
.modal-fundo {
  position: absolute;
  inset: 0;
  background: rgba(10,9,10,0.92);
  backdrop-filter: blur(8px);
}
.modal-caixa {
  position: relative;
  z-index: 2;
  width: 92%;
  max-width: 960px;
  background: #000;
  border-radius: 14px;
  overflow: hidden;
}
.modal-fechar {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 3;
  background: rgba(255,255,255,0.12);
  border: none;
  color: #fff;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.modal-fechar:hover { background: #FF88AF; }
.modal-video { position: relative; padding-bottom: 56.25%; height: 0; }
.modal-video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* =====================
   RESPONSIVO
   ===================== */
@media (max-width: 900px) {
  nav { padding: 0 24px; height: 70px; }
  .nav-logo { height: 30px; }
  section { padding: 72px 5vw; }
  .sobre { padding: 72px 5vw; grid-template-columns: 1fr; gap: 48px; }
  .instagram { padding: 72px 5vw; }
  .servicos { padding: 60px 5vw 0; }
  .hero { padding: 70px 5vw 0; }
  .contato { grid-template-columns: 1fr; gap: 40px; padding: 72px 5vw; }
  .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .srv-item { grid-template-columns: 40px 1fr; gap: 16px; padding: 28px 0; }
  .srv-desc { display: none; }
  .srv-nome { font-size: clamp(28px, 7vw, 48px); }
  .sobre-stats { grid-template-columns: repeat(3, 1fr); }
  footer { flex-direction: column; align-items: flex-start; gap: 20px; }
}

@media (max-width: 540px) {
  nav { padding: 0 20px; height: 62px; }
  .nav-logo { height: 24px; }
  .btn-proposta { font-size: 12px; padding: 8px 16px; }
  section { padding: 60px 5vw; }
  .sobre { padding: 60px 5vw; }
  .hero { padding: 62px 5vw 0; }
  .hero-titulo { font-size: 15vw; line-height: 0.93; margin-bottom: 36px; }
  .toggle { padding: 8px 10px 8px 18px; gap: 10px; }
  .toggle-on { font-size: 24px; }
  .toggle-bolinha { width: 36px; height: 36px; }
  .video-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .video-card { aspect-ratio: 3/4; border-radius: 10px; }
  .card-nome { font-size: 12px; }
  .card-cargo { font-size: 11px; }
  .play-btn { width: 44px; height: 44px; }
  .btn-ver-mais { padding: 11px 28px; font-size: 13px; }
  .servicos { padding-top: 60px; }
  .srv-item { grid-template-columns: 32px 1fr; gap: 12px; padding: 22px 0; }
  .srv-nome { font-size: 7vw; line-height: 1.0; }
  .srv-numero { font-size: 10px; }
  .titulo-secao { font-size: 28px; }
  .btn-instagram { padding: 13px 28px; font-size: 14px; }
  .contato { padding: 60px 5vw; gap: 32px; }
  .form-box { padding: 24px 18px; }
  .form-box input { padding: 12px 14px; }
  footer { padding: 32px 5vw; }
  .footer-logo { height: 22px; }
  .modal-caixa { width: 96%; border-radius: 12px; }
  .sobre-stats { gap: 12px; }
  .stat-num { font-size: 26px; }
  .stat-desc { font-size: 12px; }
  .sobre-titulo { font-size: 20px; }
  .sobre-texto { font-size: 14px; }
}

</style>

<script>
// ── SUPABASE — carrega conteúdo dinâmico ──
var SB_URL = 'https://nyvrwgyijzfgcwmudmui.supabase.co';
var SB_KEY = 'sb_publishable_8nguAxVYYgRbtifxN-6TMA_M0p605cA';

document.addEventListener('DOMContentLoaded', function() {
  carregarSite();
});

async function carregarSite() {
  try {
    var headers = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

    // Carregar conteúdo de todas as seções
    var resC = await fetch(SB_URL + '/rest/v1/conteudo?select=secao,dados', { headers: headers });
    if (resC.ok) {
      var rows = await resC.json();
      rows.forEach(function(row) {
        try {
          var d = typeof row.dados === 'string' ? JSON.parse(row.dados) : row.dados;
          aplicarConteudo(row.secao, d);
        } catch(e) { console.warn('Erro em ' + row.secao, e); }
      });
    }

    // Carregar vídeos
    var resV = await fetch(SB_URL + '/rest/v1/videos?select=*&order=ordem.asc&ativo=eq.true', { headers: headers });
    if (resV.ok) {
      var vids = await resV.json();
      if (vids.length) renderizarVideos(vids);
    }

  } catch(e) {
    console.warn('Supabase indisponível, usando conteúdo estático.');
  }
}

function renderizarVideos(vids) {
  var grid = document.getElementById('videoGrid');
  if (!grid || !vids.length) return;
  grid.innerHTML = vids.map(function(v) {
    var id = v.plataforma === 'vimeo' ? v.vimeo_id : v.youtube_id;
    var thumb = v.thumb || (v.plataforma === 'vimeo'
      ? 'https://vumbnail.com/' + id + '.jpg'
      : 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg');
    var attr = v.plataforma === 'vimeo' ? 'data-vimeo="' + id + '"' : 'data-yt="' + id + '"';
    return '<div class="video-card" ' + attr + '>' +
      '<img src="' + thumb + '" alt="">' +
      '<div class="card-play"><div class="play-btn"><div class="play-tri"></div></div></div>' +
      '<div class="card-info">' +
        '<span class="card-nome">' + (v.nome || '') + '</span>' +
        '<span class="card-cargo">' + (v.cargo || '') + '</span>' +
      '</div></div>';
  }).join('');
}

function aplicarConteudo(secao, d) {
  if (secao === 'hero') {
    // Monta o título corretamente: "seu\nmandato\nem modo"
    var t = document.querySelector('.hero-titulo');
    if (t) t.innerHTML =
      '<span class="rosa">' + (d.linha1 || 's') + '</span>' +
      (d.linha2 || 'eu mandato').substring(1) + '<br>' +
      (d.linha2 || 'eu mandato') + '<br>' +
      (d.linha3 || 'em modo');
    setText('.toggle-on', d.toggle);
    // Atualiza todos os botões de proposta
    document.querySelectorAll('.btn-proposta, .sobre-cta').forEach(function(b) {
      if (b.classList.contains('btn-proposta')) b.textContent = d.btn || 'Solicite uma proposta';
    });

  } else if (secao === 'sobre') {
    setText('.sobre-stats > div:nth-child(1) .stat-num',  d.stat1_num);
    setText('.sobre-stats > div:nth-child(1) .stat-desc', d.stat1_desc);
    setText('.sobre-stats > div:nth-child(2) .stat-num',  d.stat2_num);
    setText('.sobre-stats > div:nth-child(2) .stat-desc', d.stat2_desc);
    setText('.sobre-stats > div:nth-child(3) .stat-num',  d.stat3_num);
    setText('.sobre-stats > div:nth-child(3) .stat-desc', d.stat3_desc);
    setText('.sobre-titulo', d.titulo);
    var ps = document.querySelectorAll('.sobre-texto');
    if (ps[0]) ps[0].textContent = d.p1 || '';
    if (ps[1]) ps[1].textContent = d.p2 || '';
    setText('.sobre-cta', d.btn);

  } else if (secao === 'servicos') {
    var arr = Array.isArray(d) ? d : (d.lista || []);
    var items = document.querySelectorAll('.srv-item');
    arr.forEach(function(s, i) {
      if (!items[i]) return;
      var nome = items[i].querySelector('.srv-nome');
      var desc = items[i].querySelector('.srv-desc');
      if (nome) nome.innerHTML = (s.nome || '').replace(/\n/g, '<br>');
      if (desc) desc.textContent = s.desc || '';
    });

  } else if (secao === 'instagram') {
    setText('.instagram .titulo-secao', d.titulo);
    var btn = document.querySelector('.btn-instagram');
    if (btn) {
      // Atualiza só o texto, mantém o ícone SVG
      var lastNode = btn.lastChild;
      if (lastNode && lastNode.nodeType === 3) lastNode.textContent = d.btn || '';
      else btn.appendChild(document.createTextNode(d.btn || ''));
      if (d.link) btn.href = d.link;
    }

  } else if (secao === 'contato') {
    setText('.contato .titulo-secao', d.titulo);
    var ci = document.querySelectorAll('.contato-item span:last-child');
    if (ci[0]) ci[0].textContent = d.tel || '';
    if (ci[1]) ci[1].textContent = d.email || '';
    var instaLink = document.querySelector('.redes a[title="Instagram"]');
    if (instaLink && d.insta) instaLink.href = d.insta;
    setText('.form-box h3', d.form_titulo);
    setText('.form-box p', d.form_sub);
    if (d.form_id) window.FORMSPREE_ID = d.form_id;
  }
}

function setText(sel, val) {
  if (!val) return;
  var el = document.querySelector(sel);
  if (el) el.textContent = val;
}
</script>
